name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate repo structure
        run: node scripts/validate-repo.mjs
      - name: Run smoke tests
        run: node skills/spec/scripts/test/run.mjs
      - name: Lint the example ledger with spec-status itself
        run: node skills/spec/scripts/spec-status.mjs examples --ci
